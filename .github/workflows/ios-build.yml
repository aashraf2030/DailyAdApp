name: iOS Build and Deploy

# متى يشتغل Workflow؟
on:
  # يشتغل لما تعمل push على branch master
  push:
    branches: [ master ]
  
  # أو لما تعمله manually من GitHub UI
  workflow_dispatch:

jobs:
  build-ios:
    name: Build & Deploy iOS App
    runs-on: macos-latest  # GitHub توفر Mac مجاناً!
    
    steps:
    # 1. تحميل الكود
    - name: Checkout repository
      uses: actions/checkout@v4
    
    # 2. تثبيت Flutter
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'  # أو أي version تستخدمها
        channel: 'stable'
    
    # 3. فحص Flutter
    - name: Flutter doctor
      run: flutter doctor -v
    
    # 4. تحميل dependencies
    - name: Install dependencies
      run: flutter pub get
    
    # 5. تشغيل code generation (إذا تستخدم build_runner)
    # - name: Run build_runner
    #   run: flutter pub run build_runner build --delete-conflicting-outputs
    
    # 6. إعداد Apple Certificates
    - name: Setup iOS Certificates
      env:
        APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      run: |
        # إنشاء مجلد للـ certificates
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        
        # تحويل base64 إلى ملفات
        echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
        
        # إنشاء keychain مؤقت
        security create-keychain -p "" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "" $KEYCHAIN_PATH
        
        # استيراد Certificate
        security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH
        
        # نسخ Provisioning Profile
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
    
    # 7. Build Flutter iOS
    - name: Build iOS App
      run: |
        flutter build ios --release --no-codesign
    
    # 8. Build IPA مع Code Signing
    - name: Build & Sign IPA
      run: |
        cd ios
        
        # عمل archive باستخدام xcodebuild
        xcodebuild -workspace Runner.xcworkspace \
          -scheme Runner \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $RUNNER_TEMP/Runner.xcarchive \
          archive
        
        # عمل IPA من Archive
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/Runner.xcarchive \
          -exportOptionsPlist exportOptions.plist \
          -exportPath $RUNNER_TEMP/build
    
    # 9. رفع على App Store Connect
    - name: Upload to App Store Connect
      env:
        APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
      run: |
        # إنشاء API Key file
        API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8
        echo -n "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode -o $API_KEY_PATH
        
        # رفع باستخدام xcrun altool
        xcrun altool --upload-app \
          --type ios \
          --file "$RUNNER_TEMP/build/Runner.ipa" \
          --apiKey "$APP_STORE_CONNECT_KEY_ID" \
          --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
    
    # 10. حفظ IPA كـ artifact (للتحميل اليدوي)
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-mag-ios
        path: ${{ runner.temp }}/build/Runner.ipa
        retention-days: 30
    
    # 11. تنظيف
    - name: Clean up keychain
      if: ${{ always() }}
      run: |
        security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true


